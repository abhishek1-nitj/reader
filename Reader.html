<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reader Library</title>
    <style>
      :root {
        --bg: #ede6d7;
        --bg-strong: #e2d8c2;
        --text: #2a342d;
        --panel: rgba(249, 244, 232, 0.92);
        --panel-strong: #f5efdf;
        --panel-text: #2a342d;
        --accent: #546b57;
        --accent-soft: #b9c4b3;
        --accent-strong: #304334;
        --muted: #6b746d;
        --highlight: #fff0a8;
        --font-size: 17px;
        --line-height: 1.35;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.5), transparent 28%),
          linear-gradient(135deg, var(--bg), var(--bg-strong));
        overflow: hidden;
      }

      body {
        color: var(--text);
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", "Palatino", "Georgia", serif;
      }

      button,
      input {
        font: inherit;
      }

      .app-shell {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      .library-pane {
        position: absolute;
        inset: 0 auto 0 0;
        width: 320px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 22px 18px;
        background: rgba(233, 225, 206, 0.86);
        border-right: 1px solid rgba(84, 107, 87, 0.18);
        backdrop-filter: blur(10px);
        z-index: 30;
        transition: transform 180ms ease;
      }

      .app-shell.reader-mode .library-pane {
        transform: translateX(-100%);
      }

      .library-header h1 {
        margin: 0;
        font-size: 30px;
        letter-spacing: 0.02em;
      }

      .library-header p {
        margin: 6px 0 0;
        font-size: 13px;
        color: var(--muted);
      }

      .library-actions {
        display: grid;
        gap: 10px;
      }

      .library-search {
        position: relative;
        margin-top: 4px;
      }

      .search-suggestions {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        display: none;
        max-height: 220px;
        overflow-y: auto;
        padding: 6px;
        border: 1px solid color-mix(in oklab, var(--accent-soft) 72%, white 28%);
        border-radius: 16px;
        background: rgba(255, 251, 243, 0.98);
        box-shadow: 0 18px 36px rgba(42, 52, 45, 0.12);
        z-index: 10;
      }

      .search-suggestions.visible {
        display: grid;
        gap: 4px;
      }

      .search-suggestion {
        width: 100%;
        padding: 10px 12px;
        border: 0;
        border-radius: 12px;
        background: transparent;
        color: var(--panel-text);
        text-align: left;
        cursor: pointer;
      }

      .search-suggestion:hover,
      .search-suggestion.active {
        background: rgba(84, 107, 87, 0.12);
      }

      .input,
      .controls button,
      .action-button,
      .novel-card {
        border: 1px solid color-mix(in oklab, var(--accent-soft) 72%, white 28%);
      }

      .input {
        width: 100%;
        border-radius: 14px;
        padding: 12px 14px;
        background: rgba(255, 251, 243, 0.9);
        color: var(--panel-text);
        outline: none;
      }

      .input:focus {
        border-color: color-mix(in oklab, var(--accent) 70%, white 30%);
        box-shadow: 0 0 0 3px rgba(84, 107, 87, 0.12);
      }

      .action-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .action-button {
        border-radius: 14px;
        padding: 10px 14px;
        background: var(--panel-strong);
        color: var(--panel-text);
        cursor: pointer;
      }

      .action-button.primary {
        background: var(--accent);
        color: #f7f4eb;
      }

      .library-list {
        min-height: 0;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding-right: 4px;
      }

      .novel-card {
        width: 100%;
        border-radius: 18px;
        padding: 14px;
        text-align: left;
        background: rgba(255, 249, 239, 0.84);
        cursor: pointer;
      }

      .novel-card.settings-card {
        background: rgba(84, 107, 87, 0.1);
      }

      .novel-card.active {
        background: linear-gradient(180deg, rgba(84, 107, 87, 0.18), rgba(255, 249, 239, 0.96));
        border-color: rgba(48, 67, 52, 0.35);
      }

      .novel-card-title {
        display: block;
        font-size: 17px;
        margin-bottom: 8px;
      }

      .empty-state {
        border-radius: 18px;
        padding: 18px;
        background: rgba(255, 249, 239, 0.68);
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .settings-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(42, 52, 45, 0.24);
        z-index: 60;
      }

      .settings-overlay.open {
        display: flex;
      }

      .settings-panel {
        width: min(100%, 520px);
        border: 1px solid color-mix(in oklab, var(--accent-soft) 72%, white 28%);
        border-radius: 24px;
        padding: 20px;
        background: rgba(255, 250, 242, 0.98);
        box-shadow: 0 24px 50px rgba(42, 52, 45, 0.18);
      }

      .settings-panel h2 {
        margin: 0 0 14px;
        font-size: 24px;
      }

      .settings-grid {
        display: grid;
        gap: 12px;
      }

      .settings-label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }

      .settings-actions {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-top: 16px;
      }

      .settings-status {
        margin-top: 12px;
        min-height: 18px;
        font-size: 12px;
        color: var(--muted);
      }

      .reader-pane {
        position: relative;
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100vh;
        background: linear-gradient(180deg, rgba(250, 245, 235, 0.78), rgba(240, 232, 216, 0.9));
      }

      .chrome-hover-zone {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 86px;
        z-index: 15;
      }

      .topbar {
        position: absolute;
        top: 8px;
        left: 10px;
        right: 10px;
        z-index: 20;
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px 6px;
        opacity: 0;
        transform: translateY(-8px);
        pointer-events: none;
        transition:
          opacity 140ms ease,
          transform 140ms ease;
      }

      .app-shell.library-mode .topbar {
        display: none;
      }

      .reader-pane.show-chrome .topbar,
      .topbar:focus-within {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .novel-status,
      .controls,
      .page-counter {
        background: color-mix(in oklab, var(--panel) 92%, white 8%);
        border: 1px solid color-mix(in oklab, var(--accent-soft) 70%, #ffffff 30%);
        backdrop-filter: blur(8px);
      }

      .novel-status {
        border-radius: 999px;
        padding: 4px;
      }

      .back-button {
        width: 32px;
        height: 32px;
        border: 1px solid color-mix(in oklab, var(--accent-soft) 70%, #ffffff 30%);
        border-radius: 999px;
        padding: 0;
        background: #f7f4eb;
        color: var(--panel-text);
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
      }

      .current-title {
        font-size: 16px;
      }

      .current-subtitle {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-wrap: wrap;
        justify-content: flex-end;
        border-radius: 999px;
        padding: 4px 6px;
      }

      .control-group {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .controls button,
      .controls input {
        border-radius: 10px;
        background: #f7f4eb;
        color: var(--panel-text);
      }

      .controls button {
        width: 24px;
        height: 24px;
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
      }

      .controls input[type="number"] {
        width: 52px;
        height: 24px;
        text-align: center;
        padding: 2px 4px;
        font-size: 12px;
      }

      .controls span {
        font-size: 10px;
        opacity: 0.8;
        margin-right: 2px;
      }

      .reader {
        flex: 1 1 auto;
        width: 100%;
        min-height: 0;
        overflow-y: auto;
        padding: 12px 28px 64px 28px;
        font-size: var(--font-size);
        line-height: var(--line-height);
        letter-spacing: 0.01em;
        outline: none;
        white-space: pre-wrap;
        word-break: break-word;
        scrollbar-width: thin;
        scrollbar-color: color-mix(in oklab, var(--accent) 70%, #ffffff 30%) transparent;
      }

      .app-shell.library-mode .reader {
        padding-left: 348px;
      }

      .reader * {
        line-height: inherit !important;
        font-size: inherit !important;
        font-family: inherit !important;
      }

      .reader::-webkit-scrollbar {
        width: 14px;
      }

      .reader::-webkit-scrollbar-track {
        background: transparent;
      }

      .reader::-webkit-scrollbar-thumb {
        background: color-mix(in oklab, var(--accent) 70%, #ffffff 30%);
        border-radius: 999px;
        border: 4px solid transparent;
        background-clip: content-box;
      }

      .reader:empty::before {
        content: "Create or open a novel, then paste your text here...";
        color: color-mix(in oklab, var(--text) 55%, #ffffff 45%);
      }

      .reader mark {
        padding: 0.06em 0.08em;
        border-radius: 0.2em;
        background: var(--highlight);
        color: inherit;
      }

      .page-counter {
        position: absolute;
        right: 14px;
        bottom: 14px;
        z-index: 20;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 13px;
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
        transition:
          opacity 140ms ease,
          transform 140ms ease;
      }

      .reader-pane.show-chrome .page-counter {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 980px) {
        .library-pane {
          width: min(100vw, 360px);
        }

        .topbar {
          align-items: flex-start;
        }

        .controls {
          justify-content: flex-end;
        }

        .reader {
          padding: 12px 22px 70px;
          font-size: calc(var(--font-size) * 0.96);
        }

        .app-shell.library-mode .reader {
          padding-left: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="library-pane" aria-label="Novel library">
        <div class="library-header">
          <h1>Novels</h1>
        </div>

        <div class="library-actions">
          <input id="titleInput" class="input" type="text" placeholder="Novel title" aria-label="Novel title" />
          <div class="action-row">
            <button id="newNovelButton" class="action-button" type="button">New</button>
            <button id="saveNovelButton" class="action-button primary" type="button">Save</button>
          </div>
        </div>

        <div class="library-search">
          <input id="searchInput" class="input" type="search" placeholder="Search novels" aria-label="Search novels" autocomplete="off" />
          <div id="searchSuggestions" class="search-suggestions" aria-label="Novel suggestions"></div>
        </div>

        <div id="libraryList" class="library-list"></div>
      </aside>

      <main class="reader-pane">
        <div id="chromeHoverZone" class="chrome-hover-zone" aria-hidden="true"></div>
        <div class="topbar">
          <div class="novel-status">
            <button id="backToLibraryButton" class="back-button" type="button" aria-label="Back to library">&#8592;</button>
          </div>

          <div class="controls" aria-label="Reader controls">
            <div class="control-group" aria-label="Font size controls">
              <button id="decreaseSize" type="button" aria-label="Decrease text size">-</button>
              <input id="fontSizeInput" type="number" min="14" max="72" step="1" value="17" aria-label="Text size in pixels" />
              <span>px</span>
              <button id="increaseSize" type="button" aria-label="Increase text size">+</button>
            </div>
            <div class="control-group" aria-label="Line spacing controls">
              <button id="decreaseLineHeight" type="button" aria-label="Decrease line spacing">-</button>
              <input id="lineHeightInput" type="number" min="1" max="2.4" step="0.01" value="1.35" aria-label="Line spacing value" />
              <span>lh</span>
              <button id="increaseLineHeight" type="button" aria-label="Increase line spacing">+</button>
            </div>
          </div>
        </div>

        <div id="reader" class="reader" contenteditable="true" spellcheck="false" aria-label="Reading area"></div>
        <div class="page-counter" id="pageCounter">Page 1 of 1</div>
      </main>
    </div>

    <div id="settingsOverlay" class="settings-overlay" aria-hidden="true">
      <div class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <h2 id="settingsTitle">Settings</h2>
        <div class="settings-grid">
          <label class="settings-label">
            <span>Supabase URL</span>
            <input id="supabaseUrlInput" class="input" type="url" placeholder="https://your-project.supabase.co" />
          </label>
          <label class="settings-label">
            <span>Supabase Anon Key</span>
            <input id="supabaseAnonKeyInput" class="input" type="text" placeholder="Paste anon key" />
          </label>
        </div>
        <div class="settings-actions">
          <button id="closeSettingsButton" class="action-button" type="button">Close</button>
          <button id="syncSettingsButton" class="action-button primary" type="button">Sync</button>
        </div>
        <div id="settingsStatus" class="settings-status"></div>
      </div>
    </div>

    <script>
      const root = document.documentElement;
      const reader = document.getElementById("reader");
      const titleInput = document.getElementById("titleInput");
      const newNovelButton = document.getElementById("newNovelButton");
      const saveNovelButton = document.getElementById("saveNovelButton");
      const searchInput = document.getElementById("searchInput");
      const searchSuggestions = document.getElementById("searchSuggestions");
      const libraryList = document.getElementById("libraryList");
      const appShell = document.querySelector(".app-shell");
      const readerPane = document.querySelector(".reader-pane");
      const chromeHoverZone = document.getElementById("chromeHoverZone");
      const backToLibraryButton = document.getElementById("backToLibraryButton");
      const fontSizeInput = document.getElementById("fontSizeInput");
      const decreaseSize = document.getElementById("decreaseSize");
      const increaseSize = document.getElementById("increaseSize");
      const lineHeightInput = document.getElementById("lineHeightInput");
      const decreaseLineHeight = document.getElementById("decreaseLineHeight");
      const increaseLineHeight = document.getElementById("increaseLineHeight");
      const pageCounter = document.getElementById("pageCounter");
      const settingsOverlay = document.getElementById("settingsOverlay");
      const supabaseUrlInput = document.getElementById("supabaseUrlInput");
      const supabaseAnonKeyInput = document.getElementById("supabaseAnonKeyInput");
      const closeSettingsButton = document.getElementById("closeSettingsButton");
      const syncSettingsButton = document.getElementById("syncSettingsButton");
      const settingsStatus = document.getElementById("settingsStatus");

      const STORAGE_KEY = "reader-library-v1";
      const SETTINGS_KEY = "reader-settings-v1";
      const CHROME_REVEAL_HEIGHT = 90;
      const MIN_SIZE = 14;
      const MAX_SIZE = 72;
      const STEP = 1;
      const MIN_LINE_HEIGHT = 1;
      const MAX_LINE_HEIGHT = 2.4;
      const LINE_HEIGHT_STEP = 0.02;

      let state = loadState();
      let activeNovelId = state.activeNovelId || null;
      let searchQuery = "";
      let selectedSuggestionIndex = -1;
      let isRenderingHighlight = false;
      let saveTimer = null;
      let scrollSaveTimer = null;
      let syncTimer = null;
      let syncInFlight = false;

      function loadState() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
          return {
            novels: Array.isArray(parsed.novels) ? parsed.novels : [],
            activeNovelId: typeof parsed.activeNovelId === "string" ? parsed.activeNovelId : null
          };
        } catch {
          return { novels: [], activeNovelId: null };
        }
      }

      function saveState() {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({
            novels: state.novels,
            activeNovelId
          })
        );
      }

      function setAppMode(mode) {
        appShell.classList.remove("library-mode", "reader-mode");
        appShell.classList.add(mode);
        if (mode === "library-mode") {
          readerPane.classList.remove("show-chrome");
        }
      }

      function isReaderMode() {
        return appShell.classList.contains("reader-mode");
      }

      function loadSettings() {
        try {
          return JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
        } catch {
          return {};
        }
      }

      function saveSettings(settings) {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
      }

      function getSettings() {
        const settings = loadSettings();
        if (!settings.deviceId) {
          settings.deviceId = crypto.randomUUID();
          saveSettings(settings);
        }
        return settings;
      }

      function setSettingsStatus(message, isError = false) {
        settingsStatus.textContent = message || "";
        settingsStatus.style.color = isError ? "#9a3d2e" : "var(--muted)";
      }

      function openSettings() {
        const settings = getSettings();
        supabaseUrlInput.value = settings.supabaseUrl || "";
        supabaseAnonKeyInput.value = settings.supabaseAnonKey || "";
        setSettingsStatus(settings.lastSyncMessage || "");
        settingsOverlay.classList.add("open");
        settingsOverlay.setAttribute("aria-hidden", "false");
      }

      function closeSettings() {
        settingsOverlay.classList.remove("open");
        settingsOverlay.setAttribute("aria-hidden", "true");
      }

      function getSyncConfig() {
        const settings = getSettings();
        const supabaseUrl = (settings.supabaseUrl || "").trim().replace(/\/+$/, "");
        const supabaseAnonKey = (settings.supabaseAnonKey || "").trim();
        return {
          ...settings,
          supabaseUrl,
          supabaseAnonKey,
          isConfigured: Boolean(supabaseUrl && supabaseAnonKey)
        };
      }

      function serializeNovelForSync(novel, config) {
        return {
          id: novel.id,
          user_id: config.deviceId,
          title: novel.title || "Untitled Novel",
          content: novel.content || "",
          scroll_top: Math.max(0, Math.floor(novel.scrollTop || 0)),
          highlight_start: novel.highlight?.start ?? null,
          highlight_end: novel.highlight?.end ?? null,
          font_size: parseInt(fontSizeInput.value, 10) || 17,
          line_height: parseFloat(lineHeightInput.value) || 1.35,
          is_active: novel.id === activeNovelId,
          client_updated_at: new Date(novel.updatedAt || Date.now()).toISOString()
        };
      }

      function applyRemoteNovels(rows) {
        const byId = new Map(state.novels.map((novel) => [novel.id, novel]));
        for (const row of rows) {
          const remoteTime = Date.parse(row.client_updated_at || row.updated_at || 0);
          const local = byId.get(row.id);
          const localTime = local?.updatedAt || 0;
          if (local && localTime > remoteTime) continue;

          byId.set(row.id, {
            id: row.id,
            title: row.title || "Untitled Novel",
            content: row.content || "",
            scrollTop: row.scroll_top || 0,
            highlight: row.highlight_start == null || row.highlight_end == null
              ? null
              : { start: row.highlight_start, end: row.highlight_end },
            updatedAt: remoteTime || Date.now()
          });

          if (row.is_active) {
            activeNovelId = row.id;
          }
        }

        state.novels = Array.from(byId.values());
        saveState();
      }

      async function pullFromSupabase(config) {
        const url = `${config.supabaseUrl}/rest/v1/reader_novels?user_id=eq.${encodeURIComponent(config.deviceId)}&select=*`;
        const response = await fetch(url, {
          method: "GET",
          headers: {
            apikey: config.supabaseAnonKey,
            Authorization: `Bearer ${config.supabaseAnonKey}`
          }
        });
        if (!response.ok) {
          const details = await response.text();
          throw new Error(`Pull failed (${response.status})${details ? `: ${details}` : ""}`);
        }
        const rows = await response.json();
        applyRemoteNovels(Array.isArray(rows) ? rows : []);
      }

      async function pushToSupabase(config) {
        if (state.novels.length === 0) return;
        const payload = state.novels.map((novel) => serializeNovelForSync(novel, config));
        const response = await fetch(`${config.supabaseUrl}/rest/v1/reader_novels`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Prefer: "resolution=merge-duplicates",
            apikey: config.supabaseAnonKey,
            Authorization: `Bearer ${config.supabaseAnonKey}`
          },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          const details = await response.text();
          throw new Error(`Push failed (${response.status})${details ? `: ${details}` : ""}`);
        }
      }

      async function syncWithSupabase({ manual = false } = {}) {
        const config = getSyncConfig();
        if (!config.isConfigured) {
          if (manual) {
            setSettingsStatus("Enter the Supabase URL and anon key first.", true);
          }
          return;
        }

        if (syncInFlight) return;
        syncInFlight = true;

        try {
          flushPendingSaves();
          await pushToSupabase(config);
          await pullFromSupabase(config);
          renderLibrary();
          if (isReaderMode() && getActiveNovel()) {
            openNovel(activeNovelId);
          }

          const message = `Last synced ${new Date().toLocaleString()}`;
          saveSettings({
            ...getSettings(),
            supabaseUrl: config.supabaseUrl,
            supabaseAnonKey: config.supabaseAnonKey,
            lastSyncMessage: message
          });
          setSettingsStatus(message);
        } catch (error) {
          const message = error instanceof Error ? error.message : "Sync failed";
          saveSettings({
            ...getSettings(),
            supabaseUrl: config.supabaseUrl,
            supabaseAnonKey: config.supabaseAnonKey,
            lastSyncMessage: message
          });
          setSettingsStatus(message, true);
        } finally {
          syncInFlight = false;
        }
      }

      function queueAutoSync() {
        const config = getSyncConfig();
        if (!config.isConfigured) return;
        window.clearTimeout(syncTimer);
        syncTimer = window.setTimeout(() => {
          syncWithSupabase();
        }, 700);
      }

      function createNovel(title) {
        const now = Date.now();
        return {
          id: `novel-${now}-${Math.random().toString(36).slice(2, 8)}`,
          title,
          content: "",
          scrollTop: 0,
          highlight: null,
          updatedAt: now
        };
      }

      function getActiveNovel() {
        return state.novels.find((novel) => novel.id === activeNovelId) || null;
      }

      function normalizePastedText(text) {
        return text
          .replace(/\r\n?/g, "\n")
          .replace(/\u00a0/g, " ")
          .split("\n")
          .map((line) => line.replace(/\t/g, "    ").replace(/[ \t]+$/g, ""))
          .join("\n")
          .replace(/\n{3,}/g, "\n\n")
          .trim();
      }

      function clampFontSize(value) {
        if (Number.isNaN(value)) return parseInt(getComputedStyle(root).getPropertyValue("--font-size"), 10) || 17;
        return Math.min(MAX_SIZE, Math.max(MIN_SIZE, value));
      }

      function clampLineHeight(value) {
        if (Number.isNaN(value)) return parseFloat(getComputedStyle(root).getPropertyValue("--line-height")) || 1.35;
        return Math.min(MAX_LINE_HEIGHT, Math.max(MIN_LINE_HEIGHT, value));
      }

      function applyFontSize(size) {
        const next = clampFontSize(size);
        root.style.setProperty("--font-size", `${next}px`);
        fontSizeInput.value = String(next);
        saveSettings({
          ...loadSettings(),
          fontSize: next
        });
        requestAnimationFrame(updatePageMetrics);
      }

      function applyLineHeight(value) {
        const next = clampLineHeight(value);
        root.style.setProperty("--line-height", String(next));
        lineHeightInput.value = next.toFixed(2);
        saveSettings({
          ...loadSettings(),
          lineHeight: next
        });
        requestAnimationFrame(updatePageMetrics);
      }

      function getTotalPages() {
        return Math.max(1, Math.ceil(reader.scrollHeight / reader.clientHeight));
      }

      function getCurrentPage() {
        const page = Math.floor(reader.scrollTop / reader.clientHeight) + 1;
        return Math.min(getTotalPages(), Math.max(1, page));
      }

      function updatePageMetrics() {
        pageCounter.textContent = `Page ${getCurrentPage()} of ${getTotalPages()}`;
      }

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function highlightToHtml(text, highlight) {
        const safeText = escapeHtml(text);
        if (!highlight || typeof highlight.start !== "number" || typeof highlight.end !== "number") {
          return safeText.replace(/\n/g, "<br>");
        }

        const start = Math.max(0, Math.min(text.length, highlight.start));
        const end = Math.max(start, Math.min(text.length, highlight.end));
        if (start === end) {
          return safeText.replace(/\n/g, "<br>");
        }

        const before = escapeHtml(text.slice(0, start));
        const middle = escapeHtml(text.slice(start, end));
        const after = escapeHtml(text.slice(end));
        return `${before}<mark>${middle}</mark>${after}`.replace(/\n/g, "<br>");
      }

      function setReaderContent(text, highlight) {
        isRenderingHighlight = true;
        reader.innerHTML = highlightToHtml(text, highlight);
        isRenderingHighlight = false;
      }

      function plainReaderText() {
        return (reader.innerText || "").replace(/\r\n?/g, "\n");
      }

      function clearHighlight() {
        const text = plainReaderText();
        setReaderContent(text, null);
      }

      function getTextOffset(node, nodeOffset) {
        const range = document.createRange();
        range.selectNodeContents(reader);
        range.setEnd(node, nodeOffset);
        return range.toString().length;
      }

      function saveActiveNovel({ preserveSelection = false } = {}) {
        const novel = getActiveNovel();
        if (!novel) return;

        const selection = preserveSelection ? captureSelection() : null;
        const content = normalizePastedText(plainReaderText());
        novel.title = (titleInput.value || novel.title || "Untitled Novel").trim();
        novel.content = content;
        novel.scrollTop = reader.scrollTop;
        novel.updatedAt = Date.now();
        titleInput.value = novel.title;
        saveState();
        renderLibrary();
        updateStatus();
        queueAutoSync();

        if (preserveSelection) {
          setReaderContent(content, novel.highlight);
          restoreSelection(selection);
        }
      }

      function flushPendingSaves() {
        window.clearTimeout(saveTimer);
        window.clearTimeout(scrollSaveTimer);
        saveActiveNovel();
        window.clearTimeout(syncTimer);
      }

      function queueSave(options) {
        window.clearTimeout(saveTimer);
        saveTimer = window.setTimeout(() => saveActiveNovel(options), 180);
      }

      function queueScrollSave() {
        window.clearTimeout(scrollSaveTimer);
        scrollSaveTimer = window.setTimeout(() => {
          const novel = getActiveNovel();
          if (!novel) return;
          novel.scrollTop = reader.scrollTop;
          novel.updatedAt = Date.now();
          saveState();
          renderLibrary();
          updateStatus();
          queueAutoSync();
        }, 120);
      }

      function renderLibrary() {
        libraryList.innerHTML = "";

        const settingsButton = document.createElement("button");
        settingsButton.type = "button";
        settingsButton.className = "novel-card settings-card";
        settingsButton.innerHTML = `<span class="novel-card-title">Settings</span>`;
        settingsButton.addEventListener("click", openSettings);
        libraryList.appendChild(settingsButton);

        if (state.novels.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.textContent = "";
          libraryList.appendChild(empty);
          return;
        }

        const novels = [...state.novels].sort((a, b) => b.updatedAt - a.updatedAt);
        for (const novel of novels) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `novel-card${novel.id === activeNovelId ? " active" : ""}`;
          button.dataset.id = novel.id;
          button.innerHTML = `
            <span class="novel-card-title">${escapeHtml(novel.title || "Untitled Novel")}</span>
          `;
          button.addEventListener("click", () => openNovel(novel.id));
          libraryList.appendChild(button);
        }
      }

      function updateStatus() {
        return;
      }

      function getMatchingNovels() {
        const normalizedQuery = searchQuery.trim().toLowerCase();
        const novels = [...state.novels].sort((a, b) => b.updatedAt - a.updatedAt);
        if (!normalizedQuery) return novels.slice(0, 8);
        return novels.filter((novel) => (novel.title || "").toLowerCase().includes(normalizedQuery)).slice(0, 8);
      }

      function hideSuggestions() {
        searchSuggestions.classList.remove("visible");
        searchSuggestions.innerHTML = "";
        selectedSuggestionIndex = -1;
      }

      function renderSuggestions() {
        const matches = getMatchingNovels();
        searchSuggestions.innerHTML = "";

        if (!searchQuery.trim() || matches.length === 0) {
          hideSuggestions();
          return;
        }

        matches.forEach((novel, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `search-suggestion${index === selectedSuggestionIndex ? " active" : ""}`;
          button.textContent = novel.title || "Untitled Novel";
          button.addEventListener("mousedown", (event) => {
            event.preventDefault();
            openNovelFromSearch(novel.id);
          });
          searchSuggestions.appendChild(button);
        });

        searchSuggestions.classList.add("visible");
      }

      function openNovelFromSearch(id) {
        const novel = state.novels.find((entry) => entry.id === id);
        if (!novel) return;
        searchInput.value = novel.title || "";
        searchQuery = novel.title || "";
        hideSuggestions();
        openNovel(id);
      }

      function openNovel(id) {
        saveActiveNovel();
        activeNovelId = id;
        const novel = getActiveNovel();
        if (!novel) return;
        setAppMode("reader-mode");
        titleInput.value = novel.title || "";
        setReaderContent(novel.content || "", novel.highlight);
        updateStatus();
        renderLibrary();
        requestAnimationFrame(() => {
          reader.scrollTop = novel.scrollTop || 0;
          updatePageMetrics();
          reader.focus();
        });
        saveState();
      }

      function ensureActiveNovel() {
        if (getActiveNovel()) return getActiveNovel();
        const title = (titleInput.value || "").trim() || `Novel ${state.novels.length + 1}`;
        const novel = createNovel(title);
        state.novels.push(novel);
        activeNovelId = novel.id;
        saveState();
        renderLibrary();
        updateStatus();
        return novel;
      }

      function saveNovelFromInputs() {
        const title = (titleInput.value || "").trim() || "Untitled Novel";
        let novel = getActiveNovel();

        if (!novel) {
          novel = createNovel(title);
          state.novels.push(novel);
          activeNovelId = novel.id;
        }

        novel.title = title;
        novel.content = normalizePastedText(plainReaderText());
        novel.scrollTop = reader.scrollTop;
        novel.updatedAt = Date.now();
        saveState();
        renderLibrary();
        updateStatus();
        queueAutoSync();
      }

      function resetForNewNovel() {
        saveActiveNovel();
        activeNovelId = null;
        titleInput.value = "";
        setReaderContent("", null);
        reader.scrollTop = 0;
        renderLibrary();
        updateStatus();
        updatePageMetrics();
        setAppMode("library-mode");
        reader.focus();
      }

      function captureSelection() {
        const selection = window.getSelection();
        if (!selection || selection.rangeCount === 0) return null;
        const range = selection.getRangeAt(0);
        if (!reader.contains(range.startContainer) || !reader.contains(range.endContainer)) return null;
        return {
          start: getTextOffset(range.startContainer, range.startOffset),
          end: getTextOffset(range.endContainer, range.endOffset)
        };
      }

      function getNodeForOffset(offset) {
        const walker = document.createTreeWalker(reader, NodeFilter.SHOW_TEXT);
        let current = walker.nextNode();
        let consumed = 0;

        while (current) {
          const length = current.nodeValue.length;
          if (offset <= consumed + length) {
            return { node: current, offset: offset - consumed };
          }
          consumed += length;
          current = walker.nextNode();
        }

        return null;
      }

      function restoreSelection(saved) {
        if (!saved) return;
        const start = getNodeForOffset(saved.start);
        const end = getNodeForOffset(saved.end);
        if (!start || !end) return;

        const range = document.createRange();
        range.setStart(start.node, Math.max(0, Math.min(start.offset, start.node.nodeValue.length)));
        range.setEnd(end.node, Math.max(0, Math.min(end.offset, end.node.nodeValue.length)));

        const selection = window.getSelection();
        if (!selection) return;
        selection.removeAllRanges();
        selection.addRange(range);
      }

      function normalizeSelectionRange() {
        const selection = window.getSelection();
        if (!selection || selection.rangeCount === 0) return null;
        const range = selection.getRangeAt(0);
        if (!reader.contains(range.commonAncestorContainer)) return null;

        const text = selection.toString().trim();
        if (!text) return null;

        const start = getTextOffset(range.startContainer, range.startOffset);
        const end = getTextOffset(range.endContainer, range.endOffset);
        if (end <= start) return null;
        return { start, end, text };
      }

      function applySelectionHighlight() {
        const novel = ensureActiveNovel();
        const normalized = normalizeSelectionRange();
        if (!normalized) return;

        const content = normalizePastedText(plainReaderText());
        const before = content.slice(0, normalized.start);
        const middle = content.slice(normalized.start, normalized.end);
        if (!middle.trim()) return;

        novel.highlight = {
          start: before.length,
          end: before.length + middle.length
        };
        novel.scrollTop = reader.scrollTop;
        novel.updatedAt = Date.now();
        novel.content = content;
        titleInput.value = novel.title || "";
        setReaderContent(content, novel.highlight);
        requestAnimationFrame(() => {
          reader.scrollTop = novel.scrollTop || 0;
          updatePageMetrics();
        });
        saveState();
        renderLibrary();
        updateStatus();
        queueAutoSync();
      }

      function handleReaderInput() {
        if (isRenderingHighlight) return;
        const novel = ensureActiveNovel();
        novel.highlight = null;
        queueSave({ preserveSelection: true });
        updatePageMetrics();
      }

      function handleReaderPaste(event) {
        event.preventDefault();
        const rawText = event.clipboardData?.getData("text/plain") || "";
        const text = normalizePastedText(rawText);
        if (!text) return;

        const selection = window.getSelection();
        if (!selection || selection.rangeCount === 0) {
          reader.textContent += text;
          handleReaderInput();
          return;
        }

        selection.deleteFromDocument();
        selection.getRangeAt(0).insertNode(document.createTextNode(text));
        selection.collapseToEnd();
        handleReaderInput();
      }

      function restoreInitialState() {
        const settings = loadSettings();
        applyFontSize(parseInt(String(settings.fontSize || fontSizeInput.value), 10));
        applyLineHeight(parseFloat(String(settings.lineHeight || lineHeightInput.value)));
        renderLibrary();
        setAppMode("library-mode");
        updateStatus();
        updatePageMetrics();
        if (getSyncConfig().isConfigured) {
          syncWithSupabase();
        }
      }

      fontSizeInput.addEventListener("change", () => applyFontSize(parseInt(fontSizeInput.value, 10)));
      decreaseSize.addEventListener("click", () => applyFontSize(parseInt(fontSizeInput.value, 10) - STEP));
      increaseSize.addEventListener("click", () => applyFontSize(parseInt(fontSizeInput.value, 10) + STEP));
      lineHeightInput.addEventListener("change", () => applyLineHeight(parseFloat(lineHeightInput.value)));
      decreaseLineHeight.addEventListener("click", () => applyLineHeight(parseFloat(lineHeightInput.value) - LINE_HEIGHT_STEP));
      increaseLineHeight.addEventListener("click", () => applyLineHeight(parseFloat(lineHeightInput.value) + LINE_HEIGHT_STEP));

      saveNovelButton.addEventListener("click", saveNovelFromInputs);
      newNovelButton.addEventListener("click", resetForNewNovel);
      searchInput.addEventListener("input", () => {
        searchQuery = searchInput.value || "";
        selectedSuggestionIndex = -1;
        renderSuggestions();
      });
      searchInput.addEventListener("focus", renderSuggestions);
      searchInput.addEventListener("keydown", (event) => {
        const matches = getMatchingNovels();
        if (!matches.length || !searchQuery.trim()) return;

        if (event.key === "ArrowDown") {
          event.preventDefault();
          selectedSuggestionIndex = Math.min(matches.length - 1, selectedSuggestionIndex + 1);
          renderSuggestions();
          return;
        }

        if (event.key === "ArrowUp") {
          event.preventDefault();
          selectedSuggestionIndex = Math.max(0, selectedSuggestionIndex - 1);
          renderSuggestions();
          return;
        }

        if (event.key === "Enter") {
          event.preventDefault();
          const match = matches[selectedSuggestionIndex] || matches[0];
          openNovelFromSearch(match.id);
          return;
        }

        if (event.key === "Escape") {
          hideSuggestions();
        }
      });
      document.addEventListener("click", (event) => {
        if (!event.target.closest(".library-search")) {
          hideSuggestions();
        }
      });
      function setChromeVisibility(shouldShow) {
        if (!appShell.classList.contains("reader-mode")) return;
        readerPane.classList.toggle("show-chrome", shouldShow);
      }

      chromeHoverZone.addEventListener("mouseenter", () => {
        setChromeVisibility(true);
      });
      readerPane.addEventListener("mousemove", (event) => {
        if (!appShell.classList.contains("reader-mode")) return;
        const paneRect = readerPane.getBoundingClientRect();
        const pointerY = event.clientY - paneRect.top;
        const withinTopBand = pointerY <= CHROME_REVEAL_HEIGHT;
        const overTopbar = !!event.target.closest(".topbar");
        setChromeVisibility(withinTopBand || overTopbar);
      });
      readerPane.addEventListener("mouseleave", () => {
        readerPane.classList.remove("show-chrome");
      });
      backToLibraryButton.addEventListener("click", () => {
        saveActiveNovel();
        setAppMode("library-mode");
        searchInput.focus();
      });
      closeSettingsButton.addEventListener("click", closeSettings);
      settingsOverlay.addEventListener("click", (event) => {
        if (event.target === settingsOverlay) {
          closeSettings();
        }
      });
      syncSettingsButton.addEventListener("click", async () => {
        saveSettings({
          ...getSettings(),
          supabaseUrl: (supabaseUrlInput.value || "").trim(),
          supabaseAnonKey: (supabaseAnonKeyInput.value || "").trim(),
          lastSyncMessage: ""
        });
        setSettingsStatus("Syncing...");
        await syncWithSupabase({ manual: true });
      });

      titleInput.addEventListener("change", () => {
        const novel = getActiveNovel();
        if (!novel) return;
        novel.title = (titleInput.value || novel.title || "Untitled Novel").trim();
        novel.updatedAt = Date.now();
        saveState();
        renderLibrary();
        updateStatus();
        queueAutoSync();
      });

      reader.addEventListener("input", handleReaderInput);
      reader.addEventListener("scroll", () => {
        updatePageMetrics();
        queueScrollSave();
      });
      reader.addEventListener("paste", handleReaderPaste);
      reader.addEventListener("dblclick", () => {
        requestAnimationFrame(applySelectionHighlight);
      });
      window.addEventListener("resize", updatePageMetrics);
      window.addEventListener("beforeunload", flushPendingSaves);
      window.addEventListener("pagehide", flushPendingSaves);
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") {
          flushPendingSaves();
        }
      });

      restoreInitialState();
    </script>
  </body>
</html>
